reset_component:
  name: Reset Component Counter
  description: >
    Reset the maintenance usage counter for a specific component. Use this
    after performing maintenance (e.g. replacing the nozzle).
  fields:
    component:
      name: Component
      description: The component whose counter should be reset.
      required: true
      selector:
        select:
          options:
            - nozzle
            - heatbreak
            - extruder_gear
            - belts
            - linear_rods
            - linear_rails
            - build_plate
            - build_surface
            - hotend_fan
            - part_cooling_fan
            - ptfe_tube
    entry_id:
      name: Printer (entry ID)
      description: >
        Config entry ID of the target printer. Leave empty to apply to all
        configured printers.
      required: false
      selector:
        text:

set_interval:
  name: Set Maintenance Interval
  description: >
    Update the maintenance interval (in hours) for a specific component.
  fields:
    component:
      name: Component
      description: The component to configure.
      required: true
      selector:
        select:
          options:
            - nozzle
            - heatbreak
            - extruder_gear
            - belts
            - linear_rods
            - linear_rails
            - build_plate
            - build_surface
            - hotend_fan
            - part_cooling_fan
            - ptfe_tube
    interval_hours:
      name: Interval (hours)
      description: Maintenance interval in print hours.
      required: true
      selector:
        number:
          min: 1
          max: 10000
          step: 1
          unit_of_measurement: h
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

set_total_filament:
  name: Set Total Filament Used
  description: >
    Set the global filament counter to an exact value (in metres),
    without modifying the individual component counters.
  fields:
    meters:
      name: Meters
      description: Total filament used to set (in metres).
      required: true
      selector:
        number:
          min: 0
          max: 1000000
          step: 1
          unit_of_measurement: m
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

set_total_hours:
  name: Set Total Print Hours
  description: >
    Set the global print-hour counter of the printer to an exact value,
    without modifying the individual component counters.
  fields:
    hours:
      name: Hours
      description: Total print hours to set.
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          unit_of_measurement: h
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

add_hours:
  name: Add Print Hours
  description: >
    Manually add print hours to the counters. Useful for retroactive
    data entry when the integration was not running.
  fields:
    hours:
      name: Hours
      description: Number of print hours to add.
      required: true
      selector:
        number:
          min: 0.01
          max: 10000
          step: 0.1
          unit_of_measurement: h
    component:
      name: Component (optional)
      description: >
        If specified, only this component's counter is incremented.
        Leave empty to add hours to all components and the global total.
      required: false
      selector:
        select:
          options:
            - nozzle
            - heatbreak
            - extruder_gear
            - belts
            - linear_rods
            - linear_rails
            - build_plate
            - build_surface
            - hotend_fan
            - part_cooling_fan
            - ptfe_tube
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

add_plate:
  name: Add Build Plate
  description: >
    Add a new build plate (build surface) with its own usage counter and
    maintenance interval.
  fields:
    name:
      name: Name
      description: Display name for the plate (e.g. "PEI Smooth", "PEI Textured").
      required: true
      selector:
        text:
    interval_hours:
      name: Interval (hours)
      description: Maintenance/replacement threshold in print hours. Default 200 h.
      required: false
      selector:
        number:
          min: 1
          max: 10000
          step: 1
          unit_of_measurement: h
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

remove_plate:
  name: Remove Build Plate
  description: Remove a build plate and its associated entities.
  fields:
    plate_id:
      name: Plate ID
      description: The internal ID of the plate to remove (slugified name).
      required: true
      selector:
        text:
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

set_active_plate:
  name: Set Active Plate
  description: >
    Mark a plate as the currently active build surface. Only the active plate
    accumulates print hours.
  fields:
    plate_id:
      name: Plate ID
      description: The internal ID of the plate to activate.
      required: true
      selector:
        text:
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

reset_plate:
  name: Reset Plate Counter
  description: >
    Reset the hours counter for a build plate (e.g. after cleaning or replacing).
  fields:
    plate_id:
      name: Plate ID
      description: The internal ID of the plate to reset.
      required: true
      selector:
        text:
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

add_spool:
  name: Add Filament Spool
  description: Add a new filament spool to track its remaining weight.
  fields:
    name:
      name: Name
      description: Display name for the spool (e.g. "PLA White Bambu").
      required: true
      selector:
        text:
    material:
      name: Material
      description: Filament material type. Default PLA.
      required: false
      selector:
        select:
          options:
            - PLA
            - PETG
            - ABS
            - ASA
            - TPU
            - Nylon
            - PC
            - Other
    brand:
      name: Brand
      description: Filament brand name.
      required: false
      selector:
        text:
    color:
      name: Color
      description: Filament color.
      required: false
      selector:
        text:
    initial_weight_g:
      name: Initial Weight (g)
      description: Net weight of filament on the spool in grams. Default 1000 g.
      required: false
      selector:
        number:
          min: 1
          max: 10000
          step: 1
          unit_of_measurement: g
    diameter_mm:
      name: Diameter (mm)
      description: Filament diameter in mm. Default 1.75 mm.
      required: false
      selector:
        number:
          min: 1.0
          max: 3.0
          step: 0.05
          unit_of_measurement: mm
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

remove_spool:
  name: Remove Filament Spool
  description: Remove a filament spool and its associated entities.
  fields:
    spool_id:
      name: Spool ID
      description: The internal ID of the spool to remove (slugified name).
      required: true
      selector:
        text:
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

set_active_spool:
  name: Set Active Spool
  description: >
    Mark a spool as the currently loaded filament. Only the active spool's
    remaining weight is decremented during printing.
  fields:
    spool_id:
      name: Spool ID
      description: The internal ID of the spool to activate.
      required: true
      selector:
        text:
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:

update_spool_weight:
  name: Update Spool Remaining Weight
  description: >
    Manually set the remaining filament weight for a spool (e.g. after weighing it).
  fields:
    spool_id:
      name: Spool ID
      description: The internal ID of the spool to update.
      required: true
      selector:
        text:
    remaining_weight_g:
      name: Remaining Weight (g)
      description: Current remaining filament weight in grams.
      required: true
      selector:
        number:
          min: 0
          max: 10000
          step: 1
          unit_of_measurement: g
    entry_id:
      name: Printer (entry ID)
      description: Config entry ID of the target printer. Leave empty for all.
      required: false
      selector:
        text:
